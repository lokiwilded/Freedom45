name: Deploy dashboard to GitHub Pages

# Builds the Vite dashboard in ui/ and publishes it to GitHub Pages.
# The dashboard reads baked static JSON from ui/public/data (committed), so no server or
# secret is needed to deploy. Refresh that data with `npm run dump-static` in mcp-server.

on:
  push:
    branches: [main, loki]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install
        working-directory: ui
        run: npm ci
      - name: Build
        working-directory: ui
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
